# Plugin affichant les entités Home Assistant.
#
# Utilise l’API REST de Home Assistant pour récupérer les classes et valeurs des entités.
---
name: 'Home Assistant Sensors'

custom_fields:
  - name: HomeAssistant URL
    keyname: url
    field_type: url
    description: Your HomeAssistant server URL.
  - name: HomeAssistant Token
    keyname: token
    field_type: string
    description: A token linked to a User with `GET /api/states/` permission.
  - name: Entities
    keyname: entities_ids
    field_type: multi_string
    description: List of entity to monitor.
  - field_type: author_bio
    keyname: readme
    category: personal
    name: HomeAssistant Tiles
    description: |
      Display HomeAssistant entities as small tiles.
      <br><br>
      This plugin is not meant for real-time monitoring. You can use it for daily statistics (last day energy consumption) or future alarms (EDF today and tomorrow color).
      <br>
      Use the name of the entity from HomeAssistant.
      Each entity will use a default icon depending on its type or a 'mdi:…' icon defined in HomeAssistant.
      <br>
      <strong>Read-only Account</strong>
      <br>
      First create a custom HomeAssistant account for TRMNL, then edit the file .storage/auth and give it the group_ids ["system-read-only"]. Use this account to generate a token.
    github_url: https://github.com/Baenimyr/trmnl-plugin-homeassistant-entities

strategy: polling
polling_url: |
  {% assign ids = entities_ids | split: "," %}{% for id in ids %}{{ url }}/api/states/{{ id }}
  {% endfor %}
polling_verb: get
polling_headers: "Authorization=Bearer {{ token }}"

no_screen_padding: 'no'
dark_mode: 'no'
static_data: '{}'
refresh_interval: 60
